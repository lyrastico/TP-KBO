services:
  # ---------------------------------------------------------------------------
  # MongoDB : couches Bronze (enterprise_finale), Silver (enterprise_silver)
  # et StateDB (state_nbb) pour le suivi du scraping NBB.
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: kbo_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    volumes:
      # Données stockées sur D: (disque avec de l'espace) via bind mount.
      - ${MONGO_DATA_HOST:-D:/DockerData/kbo-mongo}:/data/db

  # Interface web pour inspecter les collections (http://localhost:8081)
  mongo-express:
    image: mongo-express:1.0.2
    container_name: kbo_mongo_express
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"

  # ---------------------------------------------------------------------------
  # HDFS (optionnel) pour le stockage des dépôts financiers NBB en Bronze.
  # Activation : docker compose --profile hdfs up -d
  # WebHDFS exposé sur http://localhost:9870
  # ---------------------------------------------------------------------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: kbo_hdfs_namenode
    profiles: ["hdfs"]
    restart: unless-stopped
    environment:
      - CLUSTER_NAME=kbo
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - hdfs_namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: kbo_hdfs_datanode
    profiles: ["hdfs"]
    restart: unless-stopped
    depends_on:
      - namenode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - SERVICE_PRECONDITION=namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - hdfs_datanode:/hadoop/dfs/data

volumes:
  hdfs_namenode:
  hdfs_datanode:
